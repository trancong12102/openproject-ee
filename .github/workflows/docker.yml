name: Build & push Docker image

# Build on PRs (validate the Dockerfile builds), build + push on main, version
# tags, and manual runs. Pushes to GitHub Container Registry using the built-in
# GITHUB_TOKEN — no secrets to configure.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ghcr.io/trancong12102/openproject-ee

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Skipped on PRs (no push → no login needed).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Read the pinned upstream version from the Dockerfile (e.g. 17.4.0) so the
      # image can carry an `op-17.4.0` tag telling you which OpenProject it wraps.
      - name: Extract base OpenProject version
        id: base
        run: |
          version="$(grep -oE 'openproject:[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1 | cut -d: -f2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=op-${{ steps.base.outputs.version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # avoid the "unknown/unknown" arch entry GHCR shows
          # Single-arch (amd64) — the base slim image is built for amd64.
          # For arm64 too: add docker/setup-qemu-action@v4 above and set:
          # platforms: linux/amd64,linux/arm64
