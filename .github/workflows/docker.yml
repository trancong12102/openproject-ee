name: Build & push Docker image

# Build on PRs (validate the Dockerfile builds), build + push on main, and manual
# runs. Image tags mirror the OpenProject version pinned in the Dockerfile
# (e.g. 17.4.0 / 17.4 / 17). Pushes to GHCR with the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ghcr.io/trancong12102/openproject-ee

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Skipped on PRs (no push → no login needed).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Mirror OpenProject's tag scheme: read the pinned version from the
      # Dockerfile base image and split it into 17.4.0 / 17.4 / 17.
      - name: Extract base OpenProject version
        id: base
        run: |
          version="$(grep -oE 'openproject:[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1 | cut -d: -f2)"
          if [ -z "$version" ]; then
            echo "::error::Could not parse OpenProject version from Dockerfile" && exit 1
          fi
          {
            echo "version=$version"     # 17.4.0
            echo "minor=${version%.*}"  # 17.4
            echo "major=${version%%.*}" # 17
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.base.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ steps.base.outputs.minor }},enable={{is_default_branch}}
            type=raw,value=${{ steps.base.outputs.major }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # avoid the "unknown/unknown" arch entry GHCR shows
          # Single-arch (amd64) — the base slim image is built for amd64.
          # For arm64 too: add docker/setup-qemu-action@v4 above and set:
          # platforms: linux/amd64,linux/arm64
